services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: social_control_plane
    ports:
      - "5432:5432"
    volumes:
      - scp-postgres:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - scp-redis:/data

volumes:
  scp-postgres:
  scp-redis:
